<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agenda – Département Informatique EFREI</title>
    <meta name="description" content="Agenda des événements et permanences du département informatique EFREI.">

            <nav id="mainNav">

                    <li><a href="formations.html">Formations</a></li>
