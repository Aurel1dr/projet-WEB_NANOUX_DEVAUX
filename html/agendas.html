<!DOCTYPE html>
<html lang="fr">
    <head>
        <title>Département Informatique - Agenda</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link rel="stylesheet" type="text/css" href="../css/agendas.css">
        <link rel="stylesheet" type="text/css" href="../css/styles.css">
        <script src="../js/darkmode.js" defer></script>
        <link rel="stylesheet" type="text/css" href="../css/darkmode.css">
    </head>
    
<body class="agenda-body">
        <nav>
            <div style="display: flex; align-items: center; gap: 0px;">
                <a href="./accueil.html" class="active efrei-logo">
                    <img src="../img/img_logo/Efrei-logo-couleur.svg" alt="logo EFREI">
                </a>
                <div class="nav-title">
                    <a href="./accueil.html" style="text-decoration: none; color: inherit; display: contents;">
                        <span>Département</span>
                        <span>Informatique</span>
                    </a>
                </div>
            </div>
            <div class="nav-links">
                <a href="./agendas.html" class="active">Agenda</a>
                <a href="./formation.html">Formation</a>
                <a href="./equipe.html">Équipe</a>
                <a href="./actualite.html">Actualité</a>
                <a href="./apropos.html">À propos</a>
            </div>
            <button id="theme-toggle" class="theme-btn">
                <img id="theme-icon" src="../img/img_logo/moon.svg" alt="Mode Sombre">
            </button>
            <a href="https://myefrei.fr" class="myefrei-link" target="_blank" rel="noopener noreferrer">
                <img src="../img/img_logo/Logo_MyEfrei.svg" alt="myefrei">
            </a>
        </nav>

        <main>
    <section class="agenda-page">

        <div class="agenda-hero">
            <h1>Planning des permanences</h1>
            <p>Découvrez les horaires des permanences de chaque promotion</p>
        </div>

        <div class="agenda-header">
            <div class="header-info">
                <p class="eyebrow">Planning</p>
            </div>
            <div class="agenda-actions">
                <button id="prevWeekBtn" class="calendar-btn" data-direction="prev">Semaine précédente</button>
                <button id="nextWeekBtn" class="calendar-btn" data-direction="next">Semaine suivante</button>
            </div>
        </div>

        <div class="agenda-panels">
            
            <aside class="panel panel-sidebar">
                <div class="panel card event-types">
                    <h2>Promotions</h2>
                    <div id="legend"></div>
                </div>
            </aside>

            <section class="panel panel-calendar">
                <h2 class="visually-hidden">Calendrier des cours</h2>

                <div class="week-summary">
                    <span>Semaine du</span>
                    <strong id="weekRange"></strong>
                </div>

                <div class="agenda-grid">
                    <div class="time-column">
                        <div class="time-label"></div>
                    </div>
                    <div id="daysColumns" class="days-columns"></div>
                </div>
            </section> 
        </div> 
    </section> 
</main>

        <footer>
            <div class="footer-content">
                <a href="./apropos.html" class="footer-link">© 2026 EFREI Paris - Département Informatique - Aurélien DEVAUX-RIVIÈRE & Augustin NANOUX</a>
            </div>
        </footer>

        <script src="../js/calendar-data.js"></script>
        <script src="../js/calendrier.js"></script>
        <script>
            const savedImg = sessionStorage.getItem('bannerImg');
            if (savedImg) {
                const banner = document.createElement('div');
                banner.className = 'page-banner';
                banner.innerHTML = `<img src="${savedImg}" alt="">`;
                document.body.insertBefore(banner, document.body.firstChild);
            }
        </script>
        
    </body>
</html>
